<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Affiliate Portal Login | Coastal Debt</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<style>
  :root { --primary:#3052FF; --bg:#F2F4F9; --gray-200:#e5e7eb; --gray-500:#6b7280; --gray-800:#1f2937; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; background:var(--bg); color:var(--gray-800); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; padding:40px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,0.08); max-width:420px; width:100%; }
  h1 { margin:0 0 8px; font-size:24px; }
  .sub { color:var(--gray-500); font-size:14px; margin:0 0 24px; }
  label { display:block; font-size:13px; font-weight:500; margin:0 0 6px; }
  input { width:100%; padding:12px; border:1px solid var(--gray-200); border-radius:8px; font-size:15px; margin-bottom:16px; }
  input:focus { outline:none; border-color:var(--primary); }
  button { width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:500; cursor:pointer; }
  button:hover { filter:brightness(0.95); }
  button:disabled { opacity:0.6; cursor:wait; }
  .err { background:#fee2e2; color:#991b1b; padding:10px 12px; border-radius:8px; margin-bottom:16px; font-size:13px; display:none; }
  .footer { text-align:center; color:var(--gray-500); font-size:12px; margin-top:20px; }
</style>
</head>
<body>
<div class="card">
  <h1>Affiliate Portal</h1>
  <p class="sub">Sign in to see your leads and conversions.</p>
  <div class="err" id="err"></div>
  <form id="loginForm">
    <label>Affiliate ID</label>
    <input type="text" id="affId" placeholder="your-affiliate-id" required autocomplete="username">
    <label>PIN</label>
    <input type="password" id="pin" placeholder="Your login PIN" required autocomplete="current-password">
    <button type="submit" id="submitBtn">Sign In</button>
  </form>
  <div class="footer">Coastal Debt Affiliate Program</div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var err = document.getElementById('err');
  btn.disabled = true; btn.textContent = 'Signing in...'; err.style.display = 'none';
  try {
    var res = await fetch('/api/affiliate/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        affiliate_id: document.getElementById('affId').value.trim().toLowerCase(),
        pin: document.getElementById('pin').value
      }),
      credentials: 'include'
    });
    var data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Login failed'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; return; }
    window.location.href = '/affiliate/dashboard.html';
  } catch (e) {
    err.textContent = 'Network error. Please try again.'; err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
