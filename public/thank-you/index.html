<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thank You | Coastal Debt Resolve</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F2F4F9;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:50px 40px;max-width:540px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(17,35,55,0.08)}
.check{width:72px;height:72px;background:#10b981;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.check svg{width:36px;height:36px;color:#fff}
h1{font-size:28px;font-weight:800;color:#0B1320;margin-bottom:12px}
p{font-size:16px;color:#445268;line-height:1.6;margin-bottom:24px}
.phone{display:inline-flex;align-items:center;gap:10px;background:#3052FF;color:#fff;font-size:20px;font-weight:700;padding:16px 36px;border-radius:50px;text-decoration:none;transition:background 0.2s}
.phone:hover{background:#204CE5}
.sub{font-size:13px;color:#778091;margin-top:20px}
.logo{margin-bottom:30px}
.logo img{height:32px}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="/assets/logos/logo-dark-text.svg" alt="Coastal Debt Resolve"></div>
  <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h1>Thank You!</h1>
  <p>Your information has been received. A debt specialist will call you within <b>15 minutes</b> during business hours to discuss your MCA debt relief options.</p>
  <a href="tel:8887302056" class="phone">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
    Call Now: (888) 730-2056
  </a>
  <p class="sub">Can't wait? Call us directly for immediate assistance.</p>
</div>
</body>
</html>
